# Docker Compose configuration for Tablr
# Using Supabase for Postgres, and Qdrant in Docker for vector storage.

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tablr-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage:z
    restart: always

volumes:
  qdrant_data:
